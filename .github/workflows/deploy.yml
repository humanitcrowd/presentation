name: Sync to main

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  sync-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to main
        run: git push origin HEAD:refs/heads/main --force
